{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-box">
    <div style="text-align:center; margin-bottom:20px;">
        <h2 style="margin-bottom:8px;">Reset Password</h2>
        <p style="color:#6b7280; font-size:14px;">
            Enter your email address and we will send you a password reset link.
        </p>
    </div>

    <form method="post">
        {% csrf_token %}

        <label for="{{ form.email.id_for_label }}" style="font-weight:600;">Email Address</label>
        {{ form.email }}

        <button type="submit" class="btn" style="width:100%; margin-top:10px;">
            Send Reset Link
        </button>
    </form>

    <div style="text-align:center; margin-top:18px;">
        <a href="{% url 'login' %}" style="color:#2563eb; text-decoration:none; font-size:14px;">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
