{% extends 'base.html' %}

{% block auth_content %}
<style>
    .auth-shell {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 16px;
        background: linear-gradient(135deg, #f8fbff, #eef4ff);
    }

    .auth-box {
        width: 100%;
        max-width: 430px;
        background: white;
        padding: 30px;
        border-radius: 22px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        border: 1px solid #eef2f7;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 22px;
    }

    .auth-header h2 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 800;
        color: #0f172a;
    }

    .auth-header p {
        margin: 0;
        color: #64748b;
        font-size: 14px;
        line-height: 1.7;
    }

    .auth-box label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
        color: #334155;
    }

    .auth-box input {
        width: 100%;
        padding: 13px 14px;
        margin-bottom: 18px;
        border-radius: 12px;
        border: 1px solid #dbe3ee;
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
        transition: 0.2s ease;
    }

    .auth-box input:focus {
        border-color: #93c5fd;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .btn-main {
        width: 100%;
        padding: 13px 16px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        border-radius: 12px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s ease;
    }

    .btn-main:hover {
        transform: translateY(-1px);
    }
</style>

<div class="auth-shell">
    <div class="auth-box">
        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Enter your email address and we’ll send you a link to reset your password.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <label for="{{ form.email.id_for_label }}">Email Address</label>
            {{ form.email }}

            <button type="submit" class="btn-main">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
