<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PharmaHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 40px 20px;
        }
        .box {
            max-width: 420px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        h2 {
            margin-top: 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #1d4ed8;
        }
        .msg {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #eff6ff;
            color: #1d4ed8;
        }
        .err {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #fee2e2;
            color: #991b1b;
        }
        .links {
            text-align: center;
            margin-top: 14px;
        }
        .links a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="msg">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% if form.errors %}
            <div class="err">Invalid username or password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">Username or Email</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <p><a href="{% url 'password_reset' %}">Forgot Password?</a></p>
            <p>No account yet? <a href="{% url 'register' %}">Register</a></p>
        </div>
    </div>
</body>
</html>
