{% extends 'base.html' %}

{% block auth_content %}
<style>
    .status-card {
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .status-card::before {
        content: "";
        position: absolute;
        top: -50px;
        right: -50px;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: rgba(37, 99, 235, 0.08);
    }

    .status-content {
        position: relative;
        z-index: 2;
    }

    .status-icon {
        width: 82px;
        height: 82px;
        margin: 0 auto 18px;
        border-radius: 22px;
        background: linear-gradient(135deg, #eff6ff, #dbeafe);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        color: #2563eb;
        border: 1px solid #bfdbfe;
    }

    .status-card h2 {
        margin: 0 0 10px;
        color: #0f172a;
        font-size: 28px;
    }

    .status-card p {
        margin: 0;
        color: #64748b;
        line-height: 1.7;
        font-size: 14px;
    }

    .status-btn-wrap {
        margin-top: 22px;
    }
</style>

<div class="auth-box status-card">
    <div class="status-content">
        <div class="status-icon">✉️</div>
        <h2>Check Your Email</h2>
        <p>
            If an account exists for the email you entered, a password reset link has been sent.
            Please check your inbox and spam folder.
        </p>

        <div class="status-btn-wrap">
            <a href="{% url 'login' %}" class="btn">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
