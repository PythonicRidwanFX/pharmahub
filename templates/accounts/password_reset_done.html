{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-box">
    <div style="text-align:center;">
        <h2 style="margin-bottom:10px;">Check Your Email</h2>
        <p style="color:#6b7280; line-height:1.6;">
            If an account exists for the email you entered, a password reset link has been sent.
        </p>

        <div style="margin-top:20px;">
            <a href="{% url 'login' %}" class="btn" style="display:inline-block;">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
