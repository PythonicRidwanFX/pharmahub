{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Edit Staff</h2>
    <p>Update staff account details and role.</p>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{ staff.username }}">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ staff.email }}">
            </div>

            <div class="form-group full">
                <label>Role</label>
                <select name="role">
                    <option value="admin" {% if staff.role == 'admin' %}selected{% endif %}>Admin</option>
                    <option value="pharmacist" {% if staff.role == 'pharmacist' %}selected{% endif %}>Pharmacist</option>
                    <option value="cashier" {% if staff.role == 'cashier' %}selected{% endif %}>Cashier</option>
                    <option value="staff" {% if staff.role == 'staff' %}selected{% endif %}>Staff</option>
                    {% if staff.role == 'owner' %}
                        <option value="owner" selected>Owner</option>
                    {% endif %}
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Update Staff</button>
            <a href="{% url 'staff_list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
