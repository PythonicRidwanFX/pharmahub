{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-box">
    <div style="text-align:center;">
        <h2 style="margin-bottom:10px;">Password Reset Successful</h2>
        <p style="color:#6b7280; line-height:1.6;">
            Your password has been changed successfully. You can now log in with your new password.
        </p>

        <div style="margin-top:20px;">
            <a href="{% url 'login' %}" class="btn" style="display:inline-block;">
                Login Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
