{% extends 'base.html' %}

{% block auth_content %}
<style>
    .auth-shell {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 16px;
        background: linear-gradient(135deg, #f8fbff, #eef4ff);
    }

    .auth-box {
        width: 100%;
        max-width: 430px;
        background: white;
        padding: 32px 30px;
        border-radius: 22px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        border: 1px solid #eef2f7;
        text-align: center;
    }

    .auth-box h2 {
        margin: 0 0 10px;
        font-size: 28px;
        font-weight: 800;
        color: #0f172a;
    }

    .auth-box p {
        color: #64748b;
        line-height: 1.7;
        font-size: 14px;
        margin: 0;
    }

    .btn-main {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        padding: 12px 18px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        border-radius: 12px;
        font-weight: 700;
        text-decoration: none;
    }
</style>

<div class="auth-shell">
    <div class="auth-box">
        <h2>Password Reset Successful</h2>
        <p>
            Your password has been changed successfully. You can now log in with your new password.
        </p>

        <a href="{% url 'login' %}" class="btn-main">Login</a>
    </div>
</div>
{% endblock %}
