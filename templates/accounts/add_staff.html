{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Add Staff</h2>
    <p>Create a new staff account for this pharmacy.</p>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>

            <div class="form-group">
                <label>Role</label>
                {{ form.role }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password1 }}
            </div>

            <div class="form-group full">
                <label>Confirm Password</label>
                {{ form.password2 }}
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Create Staff Account</button>
            <a href="{% url 'staff_list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
