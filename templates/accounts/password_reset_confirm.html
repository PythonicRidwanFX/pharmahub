{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Confirm</title>
<style>
    .auth-shell {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 16px;
        background: linear-gradient(135deg, #f8fbff, #eef4ff);
    }

    .auth-box {
        width: 100%;
        max-width: 440px;
        background: white;
        padding: 30px;
        border-radius: 22px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        border: 1px solid #eef2f7;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 22px;
    }

    .auth-header h2 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 800;
        color: #0f172a;
    }

    .auth-header p {
        margin: 0;
        color: #64748b;
        font-size: 14px;
    }

    .auth-box label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
        color: #334155;
    }

    .auth-box input {
        width: 100%;
        padding: 13px 14px;
        margin-bottom: 18px;
        border-radius: 12px;
        border: 1px solid #dbe3ee;
        font-size: 14px;
        box-sizing: border-box;
        outline: none;
        transition: 0.2s ease;
    }

    .auth-box input:focus {
        border-color: #93c5fd;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .btn-main {
        width: 100%;
        padding: 13px 16px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        border-radius: 12px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        font-size: 14px;
    }

    .alert-danger {
        background: #fee2e2;
        color: #991b1b;
        padding: 14px;
        border-radius: 12px;
        margin-bottom: 16px;
        font-size: 14px;
        line-height: 1.6;
    }

    .center-link {
        text-align: center;
        margin-top: 10px;
    }

    .center-link a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 12px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        font-weight: 700;
    }
</style>

<div class="auth-shell">
    <div class="auth-box">
        <div class="auth-header">
            <h2>Set New Password</h2>
            <p>Choose a strong new password for your account.</p>
        </div>

        {% if validlink %}
            <form method="post">
                {% csrf_token %}

                <label for="{{ form.new_password1.id_for_label }}">New Password</label>
                {{ form.new_password1 }}

                <label for="{{ form.new_password2.id_for_label }}">Confirm New Password</label>
                {{ form.new_password2 }}

                <button type="submit" class="btn-main">Change Password</button>
            </form>
        {% else %}
            <div class="alert-danger">
                This password reset link is invalid or has expired.
            </div>

            <div class="center-link">
                <a href="{% url 'password_reset' %}">Request Another Link</a>
            </div>
        {% endif %}
    </div>
</div>
</body>
</html>
