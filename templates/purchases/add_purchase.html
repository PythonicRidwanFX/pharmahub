{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Add Purchase</h2>
    <p>Record a new stock purchase from a supplier.</p>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Drug</label>
                {{ form.drug }}
            </div>

            <div class="form-group">
                <label>Supplier</label>
                {{ form.supplier }}
            </div>

            <div class="form-group">
                <label>Quantity</label>
                {{ form.quantity }}
            </div>

            <div class="form-group">
                <label>Purchase Price</label>
                {{ form.purchase_price }}
            </div>

            <div class="form-group full">
                <label>Note</label>
                {{ form.note }}
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save Purchase</button>
            <a href="{% url 'purchase_list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
