{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Edit Drug</h2>
    <p>Update the selected drug record.</p>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Drug Name</label>
                {{ form.drug_name }}
            </div>

            <div class="form-group">
                <label>Category</label>
                {{ form.category }}
            </div>

            <div class="form-group">
                <label>Batch Number</label>
                {{ form.batch_number }}
            </div>

            <div class="form-group">
                <label>Quantity</label>
                {{ form.quantity }}
            </div>

            <div class="form-group">
                <label>Unit Price</label>
                {{ form.unit_price }}
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                {{ form.expiry_date }}
            </div>

            <div class="form-group full">
                <label>Manufacturer</label>
                {{ form.manufacturer }}
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Update Drug</button>
            <a href="{% url 'drug_list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
