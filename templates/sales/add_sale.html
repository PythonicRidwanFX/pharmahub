{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>Add Sale</h2>
    <p>Record a new sales transaction.</p>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-grid">
            <div class="form-group">
                <label>Drug</label>
                {{ form.drug }}
            </div>

            <div class="form-group">
                <label>Customer Name</label>
                {{ form.customer_name }}
            </div>

            <div class="form-group">
                <label>Quantity</label>
                {{ form.quantity }}
            </div>

            <div class="form-group">
                <label>Unit Price</label>
                {{ form.unit_price }}
            </div>

            <div class="form-group full">
                <label>Note</label>
                {{ form.note }}
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save Sale</button>
            <a href="{% url 'sale_list' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
