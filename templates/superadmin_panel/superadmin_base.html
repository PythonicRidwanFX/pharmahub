<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Admin - PharmaHub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background: #111827;
            color: white;
            border: none;
            font-size: 22px;
            padding: 8px 12px;
            border-radius: 6px;
            z-index: 1001;
            cursor: pointer;
        }

        .sidebar {
            width: 240px;
            background: #111827;
            color: white;
            padding: 20px;
            transition: left 0.3s ease;
        }

        .sidebar h2 {
            font-size: 22px;
            color: #60a5fa;
            margin-bottom: 25px;
        }

        .sidebar a {
            display: block;
            color: #e5e7eb;
            text-decoration: none;
            padding: 10px 0;
        }

        .sidebar a:hover {
            color: #60a5fa;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        .table-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn-warning {
            background: #ea580c;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
        }

        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        @media (max-width: 1100px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 800px) {
            .menu-btn {
                display: block;
            }

            .layout {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: -260px;
                width: 240px;
                height: 100vh;
                z-index: 1000;
                overflow-y: auto;
            }

            .sidebar.active {
                left: 0;
            }

            .main {
                padding: 70px 15px 20px 15px;
            }

            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    <div class="sidebar">
        <h2>PharmaHub Admin</h2>
        <a href="{% url 'admin_dashboard' %}">Dashboard</a>
        <a href="{% url 'admin_pharmacy_list' %}">All Pharmacies</a>
        <a href="{% url 'admin_payment_list' %}">Payments</a>
        <a href="{% url 'admin_subscription_list' %}">Subscriptions</a>
        <a href="{% url 'admin_plan_list' %}">Plans</a>
        <a href="/admin/">Django Admin</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>

    <div class="main">
        <div class="topbar">
            <strong>Platform Owner Dashboard</strong>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div style="background:#dcfce7; color:#166534; padding:12px; border-radius:8px; margin-bottom:15px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</div>

<script>
function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('active');
}
</script>
</body>
</html>
