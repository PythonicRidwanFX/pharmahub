{% extends 'superadmin_panel/superadmin_base.html' %}

{% block content %}
<style>
    .confirm-wrapper {
        max-width: 650px;
        margin: 40px auto;
    }

    .confirm-card {
        background: #ffffff;
        border-radius: 24px;
        padding: 30px 28px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        border: 1px solid #e2e8f0;
        text-align: center;
    }

    .success-icon {
        width: 70px;
        height: 70px;
        margin: 0 auto 18px;
        border-radius: 50%;
        background: #dcfce7;
        color: #16a34a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
        font-weight: bold;
    }

    .confirm-card h2 {
        font-size: 26px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
    }

    .confirm-text {
        font-size: 15px;
        color: #475569;
        line-height: 1.7;
        margin-bottom: 20px;
    }

    .pharmacy-name {
        font-weight: 800;
        color: #16a34a;
    }

    .info-box {
        background: #dbeafe;
        border: 1px solid #bfdbfe;
        border-radius: 14px;
        padding: 16px;
        font-size: 14px;
        color: #1d4ed8;
        margin-bottom: 24px;
    }

    .actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn-success {
        background: linear-gradient(135deg, #16a34a, #15803d);
        color: #fff;
        border: none;
        padding: 14px 20px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.25s ease;
    }

    .btn-success:hover {
        transform: translateY(-2px);
        opacity: 0.95;
    }

    .btn-cancel {
        background: #f1f5f9;
        color: #0f172a;
        padding: 14px 20px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
        border: 1px solid #e2e8f0;
        transition: 0.25s ease;
    }

    .btn-cancel:hover {
        background: #e2e8f0;
        text-decoration: none;
    }

    @media (max-width: 600px) {
        .confirm-card {
            padding: 24px 18px;
        }

        .confirm-card h2 {
            font-size: 22px;
        }
    }
</style>

<div class="confirm-wrapper">
    <div class="confirm-card">
        <div class="success-icon">✓</div>

        <h2>Activate Pharmacy</h2>

        <p class="confirm-text">
            Are you sure you want to activate
            <span class="pharmacy-name">{{ pharmacy.name }}</span>?
        </p>

        <div class="info-box">
            ℹ️ Once activated, this pharmacy will regain access to the platform based on its subscription status.
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <button type="submit" class="btn-success">
                    Yes, Activate Pharmacy
                </button>

                <a href="{% url 'admin_pharmacy_detail' pharmacy.pk %}" class="btn-cancel">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
